# golangci-lint v2 configuration. Run: golangci-lint run  /  golangci-lint fmt
version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - nilerr
    - prealloc
    - revive
    - unconvert
  exclusions:
    rules:
      # Tests may ignore errors and bend a few rules for brevity.
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/oliverhaas/djangogo
