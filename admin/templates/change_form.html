{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
  <h1>{{ title }}</h1>
  <form method="post" action="{{ action }}">
    {% csrf_token %}
    {{ form_html|safe }}
    <p><button type="submit">Save</button></p>
  </form>
  <p><a href="{{ prefix }}/{{ model }}/">Back to list</a></p>
{% endblock %}
