{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
  <h1>{{ title }}</h1>
  <p>Are you sure you want to delete {{ object }}?</p>
  <form method="post" action="{{ action }}">
    {% csrf_token %}
    <button type="submit">Delete</button>
  </form>
  <p><a href="{{ prefix }}/{{ model }}/">Cancel</a></p>
{% endblock %}
